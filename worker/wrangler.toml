name = "chalkboard"
main = "src/index.ts"
compatibility_date = "2026-06-01"

# Frontend build output, served directly at the edge. Requests that don't
# match a static file (the /api/* and /auth/* routes) fall through to the
# Hono fetch handler in src/index.ts untouched -- one worker, one origin,
# no CORS needed since the frontend's fetch calls are already relative paths.
[assets]
directory = "../frontend/dist"

[vars]
APP_URL = "https://chalkboard.crsbas.workers.dev"
# Not secret: these are Salesforce record Ids, already visible in plain SOQL
# text and needing to match the same value crs-dispatch's own wrangler.toml
# uses. Previously set as Worker secrets; moved here to match that
# convention (see TODO Chalkboard Worker.md task 1).
NEW_WO_OPPORTUNITY_ID = "006Uh00000v5szqIAA"
TIME_OFF_OPPORTUNITY_ID = "006Uh00000v6XJpIAM"

[[services]]
binding = "DISPATCH"
service = "crs-dispatch"

# Holds a live WebSocket per tech so crs-dispatch can push a "refresh" the
# moment it changes something that matters to them -- see CLAUDE.md's "Live
# push to the tech app" section. Also requires an INTERNAL_NOTIFY_SECRET
# secret (wrangler secret put INTERNAL_NOTIFY_SECRET) shared with
# crs-dispatch's BOARD_NOTIFY_SECRET.
[[durable_objects.bindings]]
name = "TECH_CHANNEL"
class_name = "TechChannel"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["TechChannel"]
